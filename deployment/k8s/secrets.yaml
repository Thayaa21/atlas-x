# TEMPLATE – Do NOT commit real secrets.
# Use a secrets manager (AWS Secrets Manager, Vault, Sealed Secrets) in production.
# Replace <base64-encoded-value> with: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: atlas-x-secrets
  namespace: fraud-detection
  labels:
    app: atlas-x
  annotations:
    # If using Sealed Secrets: kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
    # If using External Secrets Operator: see external-secrets.yaml
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
data:
  OPENAI_API_KEY: <base64-encoded-openai-key>
  NEO4J_USER: <base64-encoded-neo4j-user>
  NEO4J_PASSWORD: <base64-encoded-neo4j-password>
  POSTGRES_PASSWORD: <base64-encoded-postgres-password>
