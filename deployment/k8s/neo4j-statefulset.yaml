apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: fraud-detection
  labels:
    app: atlas-x
    component: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: atlas-x
      component: neo4j
  template:
    metadata:
      labels:
        app: atlas-x
        component: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: atlas-x-secrets
                  key: NEO4J_PASSWORD
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { cpu: "2000m", memory: "8Gi" }
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: fraud-detection
spec:
  selector:
    app: atlas-x
    component: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  clusterIP: None   # Headless service for StatefulSet
