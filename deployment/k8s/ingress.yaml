apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-x-ingress
  namespace: fraud-detection
  labels:
    app: atlas-x
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # TLS termination (configure cert-manager for production)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.atlas-x.example.com
      secretName: atlas-x-tls
  rules:
    - host: api.atlas-x.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: atlas-x-api
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: atlas-x-api
                port:
                  number: 80
